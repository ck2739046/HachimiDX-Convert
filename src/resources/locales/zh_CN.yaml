      run_ffmpeg:
        
        ui_select_file_divider: "文件选择"
        ui_video_divider: "视频设置"
        ui_audio_divider: "音频设置"
        ui_common_divider: "通用设置"

        # ---- 视频设置 ----
        ui_video_crf_label: "CRF: "
        ui_video_crf_help: |
          控制输出视频的质量

          数值越低，质量越高，文件越大。
        ui_video_resolution_label: "分辨率: "
        ui_video_resolution_help: |
          设置输出视频的分辨率

          original：保持原始分辨率。
          其他选项：按比例缩放至目标尺寸，剩余空间用黑色像素填充。
        ui_video_fps_label: "帧率: "
        ui_video_fps_help: |
          设置输出视频的帧率

          original：保持原始帧率。
        ui_video_gop_optimize_label: "优化GOP: "
        ui_video_gop_optimize_help: |
          是否启用 GOP 优化

          启用后，视频在 MajdataView 中播放会显著更流畅。
          代价是会增加输出文件大小。
          建议仅用于 MajdataView 播放的视频。
        ui_video_mute_label: "静音: "
        ui_video_mute_help: "如果启用，输出文件将不包含音频流。"

        # ---- 音频设置 ----
        ui_audio_format_label: "编码: "
        ui_audio_format_help: 选择输出音频的编码格式
        ui_audio_bitrate_label: "码率: "
        ui_audio_bitrate_help: |
          控制输出音频的质量

          码率越高，质量越高，文件越大

          注意: 括号内的码率仅仅是预估值。
        ui_audio_sample_rate_label: "采样率: "
        ui_audio_sample_rate_help: 设置输出音频的采样率
        ui_audio_volume_label: "音量(%): "
        ui_audio_volume_help: |
          调整输出音频的音量

          单位是百分比，支持范围0-200%，
          100% = 原始音量。

        # ---- 通用设置 ----
        ui_pad_start_sec_label: "片头留空: "
        ui_pad_start_sec_help: |
          在文件起始处插入指定时长的静音/黑屏片段

          单位：秒（最多保留三位小数）
          零：不插入
          正数：插入指定时长的静音/黑屏片段
        ui_start_end_label: "截取范围: "
        ui_start_end_help: |
          起始时间 ~ 结束时间，只输出中间的这部分
          
          起始时间(左): 该时间点之前的内容将被丢弃。
          - 单位: 秒（最多保留三位小数）
          - 零: 保留至文件起始 (不裁剪开头)
          - 正数: 从前往后的时间点
          
          结束时间(右): 该时间点之后的内容将被丢弃。
          - 单位: 秒（最多保留三位小数）
          - 零: 保留至文件末尾 (不裁剪结尾)
          - 正数: 从前往后的时间点
          - 负数: 从后往前的时间点

          例: 假如视频总时长 60 秒，
          起始时间 = 10，结束时间 = 50(或-10)，
          将会输出 10 秒到 50 秒之间的内容 (共 40 秒)。

        ui_clear_metadata_label: "清除元数据: "
        ui_clear_metadata_help: 是否清除输出文件的附加信息 (例如标题、作者等)
        ui_output_filename_label: "输出文件名: "
        ui_output_filename_help: |
          设置输出文件的文件名

          仅文件名，不要包含完整文件路径，或者文件扩展名。
        ui_submit_button: "提交"
        ui_taskname_placeholder: "输入任务名称 (可选)"
        
        # ---- Submit Button ----
        warning_task_submit_failed: "任务提交失败。\n\n%{error}"
        notice_task_submit_success: "任务已提交: %{task_id}"
        warning_unexpected_submit_error: "任务提交时发生意外错误：\n%{error}"




    # ---- majdata 页面 ----

    majdata_page:
      ui_select_song_button: "选择歌曲"
      ui_song_help: |
        程序会查找三类文件:

        1. 谱面文件 (*.txt)
        2. 音频文件 (*.mp3, *.ogg)
        3. 视频文件 (*.mp4)

        如果想清空左下角的视频播放器，
        随便选择一个不包含上述三类文件的文件夹，
        然后点击 "Load" 按钮即可。
      ui_play_video_help: |
        勾选：视频会在左上 MajdataView 和左下视频播放器中都播放。
        不勾选：视频只在左下视频播放器中播放。




    # ---- auto convert 页面 ----

    auto_convert_page:
      ui_select_file_divider: "文件选择"
      ui_standardize_divider: "视频标准化"
      ui_detect_divider: "音符识别"
      ui_analyze_divider: "音符分析"
      ui_common_divider: "通用设置"

      ui_select_chart_confirm_video_button: "选择 maimai 谱面确认视频"
      ui_selected_output_dir_button: "选择文件夹"
      ui_selected_output_dir_help: |
        所选择的文件夹 <可能> 需要包含以下文件:
        - <folder_name>_std.mp4
        - detect_result.txt
        - track_result.txt
        - preprocess_result.txt

      ui_song_name_label: "歌曲名称: "
      ui_video_mode_label: "视频形式: "
      ui_video_mode_help: |
        source video: 游戏原生画面
        camera footage: 相机直接拍摄街机屏幕
      ui_need_screen_rectification_label: "画面矫正: "
      ui_need_screen_rectification_help: |
        标准输入画面应满足：镜头正对屏幕、内容居中且铺满全屏。
        如果输入视频不满足要求，勾选此项可进行手动画面矫正。
        如果输入视频已满足要求，无需勾选。

      ui_skip_detect_label: "跳过检测: "
      ui_skip_detect_help: "跳过逐帧检测视频中的音符，直接读取已经存在的检测结果 (detect_result.txt)。"
      ui_skip_cls_label: "跳过分类: "
      ui_skip_cls_help: "跳过音符分类: ex, break, ex-break。"
      ui_skip_export_tracked_label: "跳过导出追踪视频: "
      ui_skip_export_tracked_help: "跳过导出带有音符追踪信息的视频。"

      ui_bpm_label: "BPM: "
      ui_bpm_help: "仅支持静态 BPM (全程不变速)\n支持整数或最多三位小数"
      ui_is_big_touch_label: "大尺寸 touch: "
      ui_is_big_touch_help: |
        在 Basic/Advanced 难度中，
        touch/touch-hold 音符的尺寸通常会更大。
      ui_chart_lv_label: "谱面难度: "
      ui_chart_lv_help: "1-easy\n2-basic\n3-advanced\n4-expert\n5-master\n6-re:master\n7-utage"
      ui_base_denominator_label: "音符间隔分辨率: "
      ui_base_denominator_help: |
        程序解析音符间隔的时间分辨率。
        默认为 16，代表单位时间为 1/16 小节，在 simai 语法中写作 "{16},"
        程序会将音符间隔对齐到单位时间
        单位时间计算: 240000 / bpm / 分辨率 (ms)
        建议单位时间 ≥30ms，如果 BPM 较高，需要适当降低分辨率以保证准确性。
        
        注: XX (12) 表示当分辨率 ≥16 时，额外支持 12 分音符。
      ui_duration_denominator_label: "音符时值分辨率: "
      ui_duration_denominator_help: |
        程序解析音符时值的时间分辨率
        默认为 8，代表单位时间为 1/8 小节，在 simai 语法中写作 "[8:x],"
        程序会将音符时值对齐到单位时间
        单位时间计算: 240000 / bpm / 分辨率 (ms)
        建议单位时间 ≥30ms，如果 BPM 较高，需要适当降低分辨率以保证准确性。
        
        注: 此选项仅适用于 slide 和 touch-hold 音符的时值，
             hold 音符的时值的分辨率与“音符间隔分辨率”相同。

      ui_enable_standardize_label: "启用视频标准化模块: "
      ui_enable_standardize_help: |
        是否启用视频标准化模块。
        启用: 对选择的谱面确认视频进行标准化处理 (拉伸/裁剪/缩放/截取)
        禁用: 跳过此步骤，后续操作直接使用已有的标准化视频
      ui_enable_detect_label: "启用音符识别模块: "
      ui_enable_detect_help: |
        是否启用音符识别模块。
        启用: 对标准化后的视频进行音符识别
        禁用: 跳过此步骤，后续操作直接使用已有的音符识别结果
      ui_enable_analyze_label: "启用音符分析模块: "
      ui_enable_analyze_help: |
        是否启用音符分析模块。
        启用: 对音符识别结果进行分析，生成最终谱面
        禁用: 跳过此步骤

      ui_advanced_mode_label: "高级模式: "


