# 大内存系统YOLO训练配置
# 针对40GB RAM优化

# 数据加载优化
dataloader:
  num_workers: 12          # 增加数据加载进程数
  pin_memory: true         # 将数据固定在内存中
  persistent_workers: true # 保持workers存活
  prefetch_factor: 4       # 预取因子

# 内存缓存策略
cache:
  mode: "ram"             # 将所有图像缓存到RAM
  max_cache_size: 30      # 最大缓存大小(GB)

# 批次大小配置
batch_sizes:
  gpu_high_mem: 40        # 高内存GPU配置
  gpu_medium_mem: 24      # 中等内存GPU配置
  cpu_high_mem: 16        # 高内存CPU配置
  cpu_medium_mem: 8       # 中等内存CPU配置

# 训练优化
training:
  mixed_precision: true   # 启用混合精度训练
  gradient_checkpointing: false  # 大内存下不需要梯度检查点
  compile_model: true     # 编译模型以提高速度
  
# 数据增强（利用大内存可以使用更复杂的增强）
augmentation:
  mosaic: 1.0
  mixup: 0.2
  copy_paste: 0.3
  cutmix: 0.0
  
# 内存监控
monitoring:
  log_memory_usage: true
  memory_threshold: 0.9   # 内存使用阈值
