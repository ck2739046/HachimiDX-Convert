<!DOCTYPE html>
<html>
<head>
    <title>MajdataView</title>
    <!-- icon converted from readme https://github.com/LingFeng-bbben/MajdataView -->
    <link rel="icon" href="{{ url_for('static', filename='MajdataView.ico') }}" type="image/x-icon">
    <!-- download from https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js -->
    <script src="{{ url_for('static', filename='socket.io.js') }}"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #000;
        }
        canvas {
            width: 750px;
            height: 380px;
        }
        #loading {
            position: absolute;
            color: white;
            font-family: sans-serif;
        }
        #error-message {
            position: absolute;
            top: 45px;
            left: 10px;
            color: yellow;
            font-family: sans-serif;
            font-size: 12px;
            opacity: 0.7;
        }
        #start-button {
            position: absolute;
            padding: 15px 30px;
            font-size: 18px;
            background: #444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: sans-serif;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="unity-canvas"></canvas>
    <div id="loading">Loading...</div>
    <div id="renderer-info"></div>
    <div id="error-message"></div>
    <button id="start-button">Click to Start</button>

    <script src="{{ url_for('static', filename='majdata-wasm/build.loader.js') }}"></script>
    <script>
        const canvas = document.getElementById('unity-canvas');
        const loadingBar = document.getElementById('loading');
        const rendererInfo = document.getElementById('renderer-info');
        const errorMessage = document.getElementById('error-message');
        const startButton = document.getElementById('start-button');
        let unityInstance = null;

        // Console output interceptor
        const originalConsoleLog = console.log;
        console.log = function() {
            if (arguments[0] && arguments[0].toString().includes("Null level")) {
                errorMessage.textContent = "Error: Chart level not found";
            }
            originalConsoleLog.apply(console, arguments);
        };

        // Initialize Socket.IO
        const socket = io();

        // Listen for chart load events
        socket.on('MajdataView_load_chart', (data) => {
            // Handle error first
            if (data.error === 1) {
                errorMessage.textContent = "Error: Maidata not found";
                return;
            }
            if (data.error === 2) {
                errorMessage.textContent = "Error: Audio not found";
                return;
            }
            // Reset error message
            errorMessage.textContent = "";
            // Send chart to MajdataView
            if (unityInstance) {
                unityInstance.SendMessage(
                    "HandleJSMessages", 
                    "ReceiveMessage",
                    `jsnmsl\n` +
                    `http://localhost:5273` +
                    `/MajdataView/src/${data.song}/${data.track}` +
                    `\n1\nlv${data.level - 1}`
                );
            }
        });

        // Listen for page refresh events  
        socket.on('MajdataView_refresh_page', () => {
            location.reload();
        });

        // Start button click
        startButton.onclick = () => {
            startButton.style.display = 'none';
            let audioContext = new (window.AudioContext || window.webkitAudioContext);

            createUnityInstance(canvas, {
                dataUrl: "{{ url_for('static', filename='majdata-wasm/build.data') }}",
                frameworkUrl: "{{ url_for('static', filename='majdata-wasm/build.framework.js') }}",
                codeUrl: "{{ url_for('static', filename='majdata-wasm/build.wasm') }}",
                streamingAssetsUrl: "StreamingAssets",
                companyName: "DefaultCompany",
                productName: "MajdataView",
                productVersion: "1.0",
            }).then((instance) => {
                unityInstance = instance;
                loadingBar.style.display = "none";

            });
        };
    </script>
</body>
</html>
